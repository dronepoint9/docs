<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="References">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<title>Reference Library — DronePoint</title>
<style>
:root{--accent:#378ADD;--accent-dark:#185FA5;--bg:#f5f5f3;--bg2:#ffffff;--bg3:#efefec;--text:#1a1a1a;--text2:#666;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--radius:12px;--radius-sm:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0f0f0;--text2:#999;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.shell{max-width:600px;margin:0 auto;padding:0 0 32px;}
.top-bar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.top-bar-title{font-size:16px;font-weight:600;color:var(--text);}
.top-bar-sub{font-size:12px;color:var(--text2);}
.btn-hub{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;color:var(--text);cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;}
.btn-hub:hover{background:var(--bg3);}
.content{padding:16px;}
.section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;padding:16px 0 8px;}
.section-label:first-child{padding-top:4px;}
.doc-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:14px 16px;text-decoration:none;cursor:pointer;transition:background 0.12s;}
.doc-card:hover,.doc-card:active{background:var(--bg3);}
.doc-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.icon-pdf{background:#FCEBEB;}
.icon-img{background:#EAF3DE;}
.icon-file{background:#E6F1FB;}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.doc-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.doc-arrow{color:var(--text2);font-size:16px;flex-shrink:0;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4;}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;}
.loading{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;}
.error-banner{background:#FCEBEB;color:#A32D2D;font-size:13px;padding:10px 16px;margin:12px 16px;border-radius:var(--radius-sm);}
.search-bar{padding:12px 16px 0;}
.search-input{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;}
.search-input:focus{outline:none;border-color:var(--accent);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.badge-pdf{background:#FCEBEB;color:#A32D2D;}
.badge-img{background:#EAF3DE;color:#27500A;}
.badge-file{background:#E6F1FB;color:#0C447C;}
</style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">Reference Library</div>
      <div class="top-bar-sub">DronePoint, LLC</div>
    </div>
    <a class="btn-hub" href="https://dronepoint9.github.io">← Hub</a>
  </div>
  <div class="search-bar">
    <input class="search-input" id="search" placeholder="Search documents…" oninput="filterDocs()">
  </div>
  <div class="content" id="content">
    <div class="loading">Loading documents…</div>
  </div>
</div>

<script>
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));

const OWNER='dronepoint9';
const REPO='docs';
const BRANCH='main';
const DOCS_PATH='docs';

// Supported file extensions to display
const SUPPORTED=['pdf','jpg','jpeg','png','gif','webp','svg','doc','docx','xls','xlsx','csv','txt','mp4'];

let allDocs=[];

function getFileType(name){
  const ext=name.split('.').pop().toLowerCase();
  if(ext==='pdf')return'pdf';
  if(['jpg','jpeg','png','gif','webp','svg'].includes(ext))return'img';
  if(['doc','docx'].includes(ext))return'word';
  if(['xls','xlsx','csv'].includes(ext))return'sheet';
  return'file';
}

function getIcon(type){
  if(type==='pdf')return'📄';
  if(type==='img')return'🖼';
  if(type==='word')return'📝';
  if(type==='sheet')return'📊';
  return'📎';
}

function getBadgeClass(type){
  if(type==='pdf')return'badge-pdf';
  if(type==='img')return'badge-img';
  return'badge-file';
}

function getIconClass(type){
  if(type==='pdf')return'icon-pdf';
  if(type==='img')return'icon-img';
  return'icon-file';
}

function formatName(name){
  return name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

function formatSize(bytes){
  if(!bytes)return'';
  if(bytes<1024)return bytes+'B';
  if(bytes<1024*1024)return Math.round(bytes/1024)+'KB';
  return(bytes/1024/1024).toFixed(1)+'MB';
}

async function fetchTree(){
  const url=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
  const res=await fetch(url,{headers:{'Accept':'application/vnd.github.v3+json'}});
  if(!res.ok)throw new Error('GitHub API error: '+res.status+'. Make sure the repo is public.');
  const data=await res.json();
  // Get all blobs inside the docs/ folder, skip hidden files and non-supported types
  return data.tree.filter(f=>{
    if(f.type!=='blob')return false;
    // Must be inside docs/ folder
    if(!f.path.startsWith(DOCS_PATH+'/'))return false;
    const name=f.path.split('/').pop();
    // Skip hidden files and README
    if(name.startsWith('.'))return false;
    if(name.toLowerCase()==='readme.md'||name.toLowerCase()==='placeholder.txt')return false;
    // Must have a supported extension
    const ext=name.split('.').pop().toLowerCase();
    return SUPPORTED.includes(ext);
  });
}

function pathToCategory(path){
  // Remove leading "docs/" prefix
  const stripped=path.replace(DOCS_PATH+'/','');
  const parts=stripped.split('/');
  // If file is directly in docs/ root, category = "General"
  if(parts.length===1)return'General';
  // Otherwise category = subfolder name(s)
  return parts.slice(0,-1).map(p=>p.replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase())).join(' / ');
}

function buildFileUrl(path){
  // Direct GitHub Pages URL to the file
  return`https://${OWNER}.github.io/${REPO}/${path}`;
}

async function loadDocs(){
  const el=document.getElementById('content');
  try{
    const files=await fetchTree();
    if(!files.length){
      el.innerHTML=`<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-title">No documents found</div>Upload PDFs or images to the <strong>docs/</strong> folder in your GitHub repo. Supported: PDF, JPG, PNG, DOCX, XLSX.</div>`;
      return;
    }
    allDocs=files.map(f=>{
      const name=f.path.split('/').pop();
      const type=getFileType(name);
      const category=pathToCategory(f.path);
      const url=buildFileUrl(f.path);
      return{name,displayName:formatName(name),type,category,url,size:f.size,path:f.path};
    }).sort((a,b)=>a.category.localeCompare(b.category)||a.displayName.localeCompare(b.displayName));
    renderDocs(allDocs);
  }catch(e){
    el.innerHTML=`<div class="error-banner">Could not load documents. Check your connection and try again.<br><small>${e.message}</small></div>`;
  }
}

function renderDocs(docs){
  const el=document.getElementById('content');
  if(!docs.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div>Try a different search term.</div>`;return;}
  const grouped={};
  docs.forEach(d=>{if(!grouped[d.category])grouped[d.category]=[];grouped[d.category].push(d);});
  let html='';
  Object.keys(grouped).sort().forEach(cat=>{
    html+=`<div class="section-label">${cat}</div>`;
    grouped[cat].forEach(d=>{
      html+=`<a class="doc-card" href="${d.url}" target="_blank">
        <div class="doc-icon ${getIconClass(d.type)}">${getIcon(d.type)}</div>
        <div class="doc-info">
          <div class="doc-name">${d.displayName}<span class="badge ${getBadgeClass(d.type)}">${d.type.toUpperCase()}</span></div>
          <div class="doc-meta">${d.category}${d.size?' · '+formatSize(d.size):''}</div>
        </div>
        <span class="doc-arrow">›</span>
      </a>`;
    });
  });
  el.innerHTML=html;
}

function filterDocs(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(!q){renderDocs(allDocs);return;}
  renderDocs(allDocs.filter(d=>d.displayName.toLowerCase().includes(q)||d.category.toLowerCase().includes(q)||d.type.includes(q)));
}

loadDocs();
</script>
</body>
</html>
